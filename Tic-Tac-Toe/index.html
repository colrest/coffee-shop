<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe & Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="container">
            <a href="#" class="logo">TicTacToe</a>
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#game">Game</a></li>
            </ul>
            <button id="theme-toggle" aria-label="Toggle Dark Mode">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-moon">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero">
            <div class="container">
                <h1>Classic Tic-Tac-Toe</h1>
                <p>Enjoy a quick game or get in touch. Built with modern web technologies.</p>
                <a href="#game" class="btn primary">Play Now</a>
            </div>
        </section>

        <section id="game" class="game-section">
            <div class="container">
                <h2>Tic-Tac-Toe</h2>
                <div class="game-info">
                    <span id="status">Player X's Turn</span>
                    <button id="reset-btn" class="btn secondary">Reset Game</button>
                </div>
                <div class="game-board" id="board">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
            </div>
        </section>


    </main>

    <footer>
        <div class="container">
            <p>&copy;TicTacToe</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
